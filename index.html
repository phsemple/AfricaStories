<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Lato:100,300,400,700,900" rel="stylesheet">
    <link rel="stylesheet" href="public/styles/style.css">
    <title>Uwimana's African Stories</title>

</head>

<body>
    <header class="header">
        <div id="title">Some longish title to see how far we get wiht ititle</div>
        <div id="level">(Level 1)</div>
    </header>
    <container class="main">

        <form action="#" class="menu">

            <div class="item-wrapper">
                <label for="language" class="language-label menu-label">Language:</label>
                <select name="language" id="language" class="menu-field">
                    <option value="SW" selected>Swahili</option>
                    <option value="EN">English</option>
                </select>
            </div>

            <div class="item-wrapper">
                <label for="autoplay" class="autoplay-label menu-label">Autoplay</label>
                <input type="checkbox" id="autoplay" class="menu-field" >
            </div>

            <div class="item-wrapper">
                <label for="rate" class="rate-label menu-label">Playback Rate:</label>
                <select name="rate" id="rate" class="menu-field">
                    <option value="1.25">1.25</option>
                    <option value="1.20">1.20</option>
                    <option value="1.15">1.15</option>
                    <option value="1.10">1.10</option>
                    <option value="1.05">1.05</option>
                    <option value="1.00" selected>Normal 1.00</option>
                    <option value="0.95">0.95</option>
                    <option value="0.90">0.90</option>
                    <option value="0.85">0.85</option>
                    <option value="0.80">0.80</option>
                    <option value="0.75">0.75</option>
                </select>
            </div>
        </form>

        <div class="story-wrapper">
            <img src="/public/images/0262/0262_00.jpg" alt="" id="picture">
            <div id="storytext">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Excepturi illum reprehenderit
                aspernatur repellendus?
            </div>
        </div>

        <div class="wrapper-controls-paging">
            <div class="controls">
                <audio id="audio" type="audio/mp3" src="/public/audio/sw/0001/0001_sw_01.mp3">
                    Your browser does not support the audio element.
                </audio>
                <img src="/public/images/panel/Back2.png" id="back" class="control-back"></img>
                <div class="wrapper-playpause">
                    <button id="playbutton" class='visible'>
                        <img src="/public/images/panel//Play.png" id="play" class="control-play visible"></img>
                    </button>
                    <button id="pausebutton" class='hidden'>
                        <img src="/public/images/panel//Pause.png" id="pause" class="control-pause hidden"></img>
                    </button>
                </div>
                <img src="/public/images/panel/Forward2.png" id="forward" class="control-forward"></img>
            </div>

            <div class="paging">
                <button class="paging-button" id="previous">&lt;&lt;</button>
                <div id="page-text">Page <span id="page-num">4</span> of <span id="page-count">12</span></div>
                <button class="paging-button" id="next">&gt;&gt;</button>
            </div>
        </div>


    </container>
    <footer class="footer">
        <div class="footer-credits">

            <div class="credits-wrapper">
                <div class="footer__credits--label">Writer:</div>
                <div id="writer" class="footer__credits--writtenby footer__credits--field">Fred Smith, Carl Jung</div>
            </div>

            <div class="credits-wrapper">
                <div class="footer__credits--label">Reader:</div>
                <div id="reader" class="footer__credits--readby footer__credits--field">Alice B Toklas</div>
            </div>

            <div class="credits-wrapper">
                <div class="footer__credits--label">Translator:</div>
                <div id="translator" class="footer__credits--translatedby footer__credits--field">Barney the Owl</div>
            </div>

            <div class="credits-wrapper">
                <div class="footer__credits--label">Illustrator:</div>
                <div id="illustrator" class="footer__credits--illustratedby footer__credits--field">Carlos Castaneda
                </div>
            </div>

        </div>

    </footer>

    <script type="module" src="public/scripts/main.js"></script>

</body>

</html>
